<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayLite - Browser Arcade</title>
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 PlayLite</h1>
            <p>27 games. No downloads. Just play.</p>
            <div class="header-stats">
                <span id="totalGames">27</span> games
            </div>
        </header>

        <div class="controls">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search games...">
            </div>
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="arcade">Arcade</button>
                <button class="filter-btn" data-filter="puzzle">Puzzle</button>
                <button class="filter-btn" data-filter="word">Word</button>
                <button class="filter-btn" data-filter="strategy">Strategy</button>
                <button class="filter-btn" data-filter="reflex">Reflex</button>
                <button class="filter-btn" data-filter="memory">Memory</button>
                <button class="filter-btn" data-filter="iq">IQ</button>
            </div>
        </div>

        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <div class="game-modal" id="gameModal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>
            <div id="gameContainer"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
